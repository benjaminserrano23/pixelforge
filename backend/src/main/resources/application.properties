spring.application.name=pixelforge-backend
server.port=8080

# Conexión a Postgres. Los valores por defecto sirven para desarrollo local
# (Postgres en localhost). En Docker Compose, las variables de entorno del
# contenedor sobrescriben el host por "db".
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/pixelforge}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:pixelforge}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:pixelforge}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate: update sirve mientras prototipamos; en producción usaremos Flyway/Liquibase.
# El dialecto lo autodetecta Hibernate desde la conexión JDBC (no lo hardcodeamos
# para que los tests con H2 también funcionen).
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# Logs limpios al arrancar
logging.level.org.springframework.security=INFO

# JWT: secreto y expiración. En prod sobreescribir JWT_SECRET vía env var
# (debe tener >= 32 caracteres para HMAC-SHA256). 900000 ms = 15 minutos.
pixelforge.jwt.secret=${JWT_SECRET:dev-only-secret-change-me-in-production-please-pixelforge}
pixelforge.jwt.expiration-ms=${JWT_EXPIRATION_MS:900000}

# Portadas de juegos: disco local montado como volumen en Docker (ver docker-compose.yml).
pixelforge.uploads.dir=${PIXELFORGE_UPLOADS_DIR:./uploads}
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
