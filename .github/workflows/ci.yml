name: CI

# Corre en cada push y PR. Los dos jobs son independientes (path filters vía
# "paths" no se usan a propósito: en un monorepo chico, la señal de "todo
# sigue verde" en cada push vale más que ahorrar unos segundos de CI).
on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  backend:
    name: Backend (Maven + JUnit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run tests
        run: mvn -B test

      - name: Build jar
        run: mvn -B -DskipTests package

  frontend:
    name: Frontend (tsc + Vitest + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

      - name: Build (incluye type check vía tsc -b)
        run: npm run build
