server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: cualquier ruta del cliente (React Router, etc.) sirve index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse proxy hacia el backend dentro de la red de Docker Compose.
    # "backend" es el nombre del servicio en docker-compose.yml; Docker lo
    # resuelve por DNS interno, no hace falta IP ni puerto del host.
    location /api/ {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
